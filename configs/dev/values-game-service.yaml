# Overrides for game-service Helm chart (dev environment)

replicaCount: 1

image:
  repository: ${ECR_REGISTRY}/game-service
  tag: latest
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  host: game.dev.yourdomain.com
  path: /
  pathType: Prefix

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

env:
  - name: DB_SECRET_NAME
    value: "cloudops/game-db"
  - name: DB_REGION
    value: "us-east-1"
  - name: LOG_LEVEL
    value: "debug"
  
  - name: REDIS_URL
    valueFrom:
      secretKeyRef:
        name: game-redis-credentials
        key: REDIS_URL

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

# Network policy (zero trust) – enabled by default
networkPolicy:
  enabled: true
  ingressFrom:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
  egressTo:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0  # restrict to RDS CIDR in production
          ports:
            - port: 5432
              protocol: TCP