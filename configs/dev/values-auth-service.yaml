# Overrides for auth-service Helm chart (dev environment)

replicaCount: 1

image:
  repository: ${ECR_REGISTRY}/auth-service
  tag: latest  # Will be replaced by CI with actual commit SHA
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  host: auth.dev.yourdomain.com
  path: /
  pathType: Prefix

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

env:
  - name: DB_SECRET_NAME
    value: "cloudops/game-db"
  - name: DB_REGION
    value: "us-east-1"
  - name: LOG_LEVEL
    value: "debug"

# Optional: enable HPA
autoscaling:
  enabled: false