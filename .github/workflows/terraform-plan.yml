name: "Terraform Plan & Test"

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'bootstrap/**'
      - 'modules/**'
      - 'terraform/env/**'
      - 'services/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  test-game-service:
    name: "Test Django Game Service"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/game-service/requirements.txt

      - name: Install dependencies
        run: pip install -r services/game-service/requirements.txt

      - name: Run Django tests
        run: |
          cd services/game-service
          python manage.py test

  terraform-plan:
    name: "Terraform Plan & Security Scan"
    runs-on: ubuntu-latest
    needs: test-game-service
    env:
      TF_WORKING_DIR: 'terraform/environments/dev'
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GH_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: modules
          framework: terraform
          soft_fail: true

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost JSON
        run: infracost breakdown --path ${{ env.TF_WORKING_DIR }} --format json --out-file /tmp/infracost.json

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_github_oidc_role_arn: ${{ secrets.GH_OIDC_ROLE_ARN }}
        run: terraform plan -no-color -out=tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

      - name: Convert Plan to Text
        run: terraform show -no-color tfplan > tfplan.txt
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/env/dev/tfplan.txt', 'utf8');
            const comment = `## Terraform Plan 📖\n\`\`\`\n${planOutput.slice(0, 65000)}\n\`\`\`\n\n*Django tests passed ✅ | Checkov & Infracost in logs*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

            # Optionally, you could also create a check run with the plan output instead of a comment for better visibility in the PR checks tab.