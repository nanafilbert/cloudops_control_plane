name: "Terraform Plan & Test"

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'bootstrap/**'
      - 'modules/**'
      - 'environments/**'
      - 'services/**'          # Also run when service code changes

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # Test all services (runs in parallel with Terraform plan)
  test-services:
    name: "Test Services"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, game-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - name: Install & Test
        run: |
          npm ci
          npm test
        working-directory: services/${{ matrix.service }}

  terraform-plan:
    name: "Terraform Plan & Security Scan"
    runs-on: ubuntu-latest
    needs: test-services   # Wait for tests to pass before planning
    env:
      TF_WORKING_DIR: 'terraform/environments/dev'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GH_OIDC_ROLE_ARN }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: modules
          framework: terraform
          soft_fail: true
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
      - name: Generate Infracost JSON
        run: infracost breakdown --path ${{ env.TF_WORKING_DIR }} --format json --out-file /tmp/infracost.json
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
      - name: Convert Plan to Text
        run: terraform show -no-color tfplan > tfplan.txt
        working-directory: ${{ env.TF_WORKING_DIR }}
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('environments/dev/tfplan.txt', 'utf8');
            const comment = `## Terraform Plan 📖\n\`\`\`\n${planOutput.slice(0, 65000)}\n\`\`\`\n\n*Tests passed ✅ | Checkov & Infracost in logs*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });