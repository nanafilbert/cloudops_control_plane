apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-rds-dns
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  # Allow DNS lookups
  - to:
    - namespaceSelector: {}
      podSelector: {}
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Allow egress to RDS (IP range – restrict in production)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - port: 5432
      protocol: TCP