apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-redis
spec:
  podSelector:
    matchLabels:
      app: game-service
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0   # In production, restrict to ElastiCache subnet
      ports:
        - port: 6379
          protocol: TCP