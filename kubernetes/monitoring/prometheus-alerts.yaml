apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: game-service-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
spec:
  groups:
    - name: game-service
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{service="game-service", status=~"5.."}[2m])) 
            / 
            sum(rate(http_requests_total{service="game-service"}[2m])) > 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "High error rate on game-service"
            description: "Error rate >5% for 2 minutes"

        - alert: GameServiceDown
          expr: absent(up{job="game-service"}) == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Game service is down"
            description: "No metrics from game-service for 1 minute"

        - alert: HighLatency
          expr: |
            histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{service="game-service"}[5m])) by (le)) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High P99 latency (>1s)"
            description: "Game service is slow"

        - alert: WebSocketDisconnectRate
          expr: rate(django_websocket_disconnects_total[5m]) > 10
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High WebSocket disconnect rate"
            description: "Many disconnects, possibly connection issues"

        - alert: DatabaseConnectionPoolExhausted
          expr: pg_stat_database_numbackends{datname="game_db"} > 80
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Database connection pool nearly full"
            description: "Over 80 connections active"

        - alert: NoActiveGameSessions
          expr: game_sessions_active == 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "No active game sessions"
            description: "Game has been idle for 30 minutes"

        - alert: PodRestartLoop
          expr: rate(kube_pod_container_status_restarts_total{namespace="game-prod", pod=~"game-service-.*"}[10m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Game pod restarting frequently"
            description: "Restarts per minute >0.1, possible crash loop"